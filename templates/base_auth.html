<!doctype html>
{% comment %}
As telas de acesso são sempre escuras (identidade da marca), independente da
preferência do sistema. O tema claro vale só para o painel interno.
{% endcomment %}
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Acesso | SandraoFlow{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="diamond-rain"></div>
    
    <main class="auth-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
