<div class="modal fade" id="challengeModal{{ account.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-modal">
            <div class="modal-header border-0">
                <h5 class="modal-title text-warning"><i class="bi bi-shield-lock me-2"></i> Verificação de Segurança</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form hx-post="{% url 'instagram:submit_challenge' account.id %}"
                  hx-target="#account-{{ account.id }}"
                  hx-swap="outerHTML"
                  hx-on="htmx:afterRequest: bootstrap.Modal.getInstance(document.getElementById('challengeModal{{ account.id }}')).hide()">
                {% csrf_token %}
                <div class="modal-body">
                    <p class="text-white">O Instagram detectou um login e solicitou um código de verificação para <strong>@{{ account.ig_username }}</strong>.</p>
                    <p class="text-muted small">Por favor, verifique seu SMS, E-mail ou aplicativo de autenticação e insira o código abaixo.</p>
                    
                    <div class="mb-3">
                        <label class="form-label text-white">Código de Verificação</label>
                        <input type="text" name="code" class="form-control text-center fs-4 letter-spacing-2" placeholder="000000" maxlength="8" required autofocus>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-warning text-dark fw-bold">Verificar Código</button>
                </div>
            </form>
        </div>
    </div>
</div>
