{% extends 'base_auth.html' %}

{% block content %}
<section class="auth-card">
    <div class="text-center mb-4">
        <i class="bi bi-instagram text-purple" style="font-size: 3rem;"></i>
    </div>
    <span class="page-kicker">Acesso do cliente</span>
    <h1>Entrar no painel</h1>
    
    <form method="post" action="{% url 'accounts:login' %}">
        {% csrf_token %}
        <label class="form-label">Usuário</label>
        <input class="form-control mb-3" type="text" name="username" required>
        
        <label class="form-label">Senha</label>
        <input class="form-control mb-3" type="password" name="password" required>
        
        <button class="btn btn-primary w-100 mt-2" type="submit">Entrar</button>
    </form>
    
    <p class="auth-link mt-4 text-center text-muted">Ainda não tem conta? <a href="{% url 'accounts:register' %}" class="text-purple">Criar cadastro</a></p>
</section>
{% endblock %}
